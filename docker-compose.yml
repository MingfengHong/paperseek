name: paperseek

services:
  web:
    build:
      context: .
    image: paperseek:latest
    ports:
      - "${PAPERSEEK_PORT:-8765}:${PAPERSEEK_CONTAINER_PORT:-7860}"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PAPERSEEK_CONTAINER_PORT:-7860}
      # Pass through host / .env variables so system env vars take precedence.
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_TYPE: ${LLM_API_TYPE}
      LLM_MODEL: ${LLM_MODEL}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL}
      CROSSREF_EMAIL: ${CROSSREF_EMAIL}
      WOS_API_KEY: ${WOS_API_KEY}
      SEARCH_FIELD: ${SEARCH_FIELD}
      DISCIPLINE_FIELDS: ${DISCIPLINE_FIELDS}
